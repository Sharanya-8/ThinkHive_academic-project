<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - ThinkHive</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🐝</div>
        <h1>ThinkHive</h1>
        <p>Sign in to your account</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'success' if cat == 'success' else 'error' }}">
            {{ '✅' if cat == 'success' else '⚠️' }} {{ msg }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Sign In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="/signup">Create one here</a>
      </div>
    </div>
  </div>
</body>
</html>
